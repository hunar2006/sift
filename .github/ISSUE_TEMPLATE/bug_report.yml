name: Bug report
description: Something in Sift behaved incorrectly.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did Sift do?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `sift --version`.
      placeholder: "0.5.0"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: OS and terminal
      placeholder: "Windows 11 / Windows Terminal, or macOS 14 / iTerm2"
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Paste your `sift doctor` output
      description: Run `sift doctor` in the affected repository and redact only sensitive paths or repository names.
      render: shell
    validations:
      required: false
  - type: dropdown
    id: diff-source
    attributes:
      label: Diff source
      options:
        - worktree
        - staged
        - range (ref/range)
        - pr
    validations:
      required: true
  - type: textarea
    id: debug
    attributes:
      label: SIFT_DEBUG=1 output
      description: Re-run with `SIFT_DEBUG=1` and paste the output. Redact anything sensitive.
      render: shell
    validations:
      required: false
