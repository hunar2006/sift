name: ci

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            node: 22
          - os: ubuntu-latest
            node: 24
          - os: macos-latest
            node: 22
          - os: windows-latest
            node: 22
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm i --frozen-lockfile
      - run: pnpm exec playwright install chromium --with-deps
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
      - run: pnpm exec playwright install chromium
        if: matrix.os == 'windows-latest'
      - run: pnpm health
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: node scripts/smoke.mjs
      - run: pnpm perf
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        env:
          PERF_MULT: 2
      - run: pnpm pack-check
        if: (matrix.os == 'ubuntu-latest' && matrix.node == 22) || matrix.os == 'windows-latest'
      - run: pnpm preflight --fast
        if: (matrix.os == 'ubuntu-latest' && matrix.node == 22) || matrix.os == 'windows-latest'

  eval:
    runs-on: ubuntu-latest
    # Expected ~4–8 minutes with a warm .evalcache (6 repos × 40 commits + fuzz subset).
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm i --frozen-lockfile
      - run: pnpm --filter @sift-review/core build
      - uses: actions/cache@v4
        with:
          path: .evalcache
          key: evalcache-${{ hashFiles('packages/eval/corpus.lock.json') }}
          restore-keys: |
            evalcache-
      - run: pnpm eval
        env:
          PERF_MULT: "2"
      - run: pnpm fuzz
        env:
          CI: "true"
          FUZZ_SEED: "24343"

  shots:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm i --frozen-lockfile
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm shots
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sift-screenshots
          path: docs/screenshots
