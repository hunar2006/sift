name: ci

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            node: 20
          - os: ubuntu-latest
            node: 22
          - os: macos-latest
            node: 20
          - os: windows-latest
            node: 20
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm i --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: node scripts/smoke.mjs
      - run: pnpm perf
        if: matrix.os == 'ubuntu-latest' && matrix.node == 20
        env:
          PERF_MULT: 2

  shots:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm i --frozen-lockfile
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm shots
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sift-screenshots
          path: docs/screenshots
