# Deploys the static marketing site under site/ to GitHub Pages on version tags.
# Present but inert until the repository is public and Pages is enabled for this
# workflow (Settings → Pages → GitHub Actions). Tag pushes will queue the job;
# it will no-op usefully only after Pages permissions exist.
name: pages

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
