# Publishes the `siftdiff` CLI to npm. INERT until a human arms it.
#
# To arm and ship (one-time + per release):
#   1. Add an npm automation token as the repo secret `NPM_TOKEN`
#      (Settings -> Secrets and variables -> Actions -> New repository secret).
#   2. Push a version tag:  git tag v0.5.0 && git push origin v0.5.0
#      (or run this workflow manually via the Actions tab -> Run workflow).
#
# Why it is inert today:
#   - It only triggers on `v*` tag pushes or manual dispatch; nothing here runs
#     on ordinary commits.
#   - The publish step is gated on `env.NPM_TOKEN != ''`. GitHub Actions does not
#     allow `secrets.*` directly in a job/step `if:`, so the secret is mapped to a
#     job-level env var and the `if:` checks that env var. With no NPM_TOKEN
#     secret configured, the expression is empty and the publish step is skipped.
#   - The same `v*` tag also triggers pages.yml, so one tag push builds+publishes
#     the package and deploys the site.
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gate:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm i --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: node scripts/smoke.mjs
      - run: pnpm pack-check

  publish:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm i --frozen-lockfile
      - run: pnpm build
      - name: Publish siftdiff to npm
        # Skipped unless a human has configured the NPM_TOKEN secret.
        if: ${{ env.NPM_TOKEN != '' }}
        working-directory: packages/cli
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
